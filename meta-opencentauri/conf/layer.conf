# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/images/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-opencentauri"
BBFILE_PATTERN_meta-opencentauri = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-opencentauri = "6"

LAYERDEPENDS_meta-opencentauri = "core sunxi"
LAYERSERIES_COMPAT_meta-opencentauri = "scarthgap"
