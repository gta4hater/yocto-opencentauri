# EDITING THIS FILE WILL EXCLUDE YOUR CHANGES FROM FUTURE UPDATES.
# -----

[mcu bed]
serial: /dev/ttyS4
baud: 115200
restart_method: command

[bed_mesh]
speed: 150.0
horizontal_move_z: 2.0
mesh_min: 20,20
mesh_max: 246,246
probe_count: 11,11
mesh_pps: 3,3
algorithm: bicubic
adaptive_margin: 5.0

[hx71x sg0]
chip: hx711
dout_pin: bed:PB14
sclk_pin: bed:PB13
sample_rate: 80
gain: A-128

[hx71x sg1]
chip: hx711
dout_pin: bed:PC8
sclk_pin: bed:PC7
sample_rate: 80
gain: A-128

[hx71x sg2]
chip: hx711
dout_pin: bed:PB15
sclk_pin: bed:PC6
sample_rate: 80
gain: A-128

[hx71x sg3]
chip: hx711
dout_pin: bed:PA8
sclk_pin: bed:PC9
sample_rate: 80
gain: A-128

[load_cell_probe]
sensor_type: load_cell_fusion
sensors: hx71x sg0, hx71x sg1, hx71x sg2, hx71x sg3
samples: 2
samples_tolerance_retries: 2
speed: 2.0
sample_retract_dist: 1.0
lift_speed: 5.0
counts_per_gram: 29.11
reference_tare_counts: 71000
z_offset: -0.15
trigger_force: 50
